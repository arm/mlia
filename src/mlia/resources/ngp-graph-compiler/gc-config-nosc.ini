; Compiler Configuration
[debug]
printIRAfterEachPass=false
printChainProposals=false
printCompiledOutput=false
printTaskSplitting=false
networkPerformanceEstimation=false
debugDatabase=true
performanceDatabase=true
commandListSummary=true

[compiler]
enableDotDump=false
noThreads=8
disableValidation=false
shaderGenOptions=

[scheduler]
enableFusing=true
enableTensorPinning=false
enableLSpeculativeCaching=false
enableGreedyChaining=false
enableSSpeculativeCaching=false
enableSearchCascading=false
enableSearchChaining=true
enableSearchTaskSplitting=true
enableSearchWeightLooping=false
enablePairwiseStriping=true
enableDirectStriping=true
enableTosaRewrites=true
enableExternalBrickFormats=true
enableStructuredSparsity=true
enableWeightLooping=true
disableWeightEncoding=false
taskSplitEnableMinorAxis=true
taskSplitEnableAxes=1111
disableNonLocalMemoryUsage=false
disableTaskSplitAllAxes=false
disableUpscale2x2Opt=false
forceLongCascade=false

[generator]
ScLabelsMode=0
