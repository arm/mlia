; System Configuration
[architecture]
max_cores=8

[memory]
name=dram
read_bandwidth=68
write_bandwidth=68
read_latency=170
write_latency=100
line_bytes=64
[memory]
name=cache1
size=32kb
limit_factor=0.5
read_data_width=64
write_data_width=32
read_latency=12
write_latency=12
line_bytes=64
[memory]
name=cache2
num_slices=8
size=256kb
limit_factor=0.5
read_data_width=64
write_data_width=64
read_latency=60
write_latency=60
line_bytes=64
[memory]
name=cache3

[system]
mapping=L1:cache1
mapping=L2:cache2
mapping=DRAM:dram
gpu_clock=750
gpu_ne_clock_scale_factor=2.0
