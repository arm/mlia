name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.10"
  UV_DEFAULT_INDEX: ${{ secrets.INTERNAL_PYPI_HOST && format('internal={0}', secrets.INTERNAL_PYPI_HOST) || '' }}
  UV_INDEX_INTERNAL_USERNAME: ${{ secrets.INTERNAL_PYPI_HOST && secrets.INTERNAL_PYPI_USERNAME || '' }}
  UV_INDEX_INTERNAL_PASSWORD: ${{ secrets.INTERNAL_PYPI_HOST && secrets.INTERNAL_PYPI_PASSWORD || '' }}

jobs:
  build_and_test_wheel:
    name: Build And Test Wheel
    runs-on: ${{ fromJson(vars.UBUNTU_RUNNER || '["ubuntu-24.04-arm"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv build --wheel
      - run: uv sync --no-sources --no-install-project --group test
      - run: |
          set -o pipefail
          uv run --no-sync \
            --with dist/*.whl \
            -- pytest --no-success-flaky-report tests/ | tee coverage.txt
      - name: Publish coverage summary
        run: |
          {
            echo "## Coverage"
            echo ""
            echo '```text'
            tail -n 20 coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore
      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
          if-no-files-found: error

  publish_release:
    name: Publish Release
    if: >-
      ${{
        always() &&
        needs.build_and_test_wheel.result == 'success' &&
        (github.repository_owner != 'arm' || github.ref_type == 'tag')
      }}
    needs: build_and_test_wheel
    if: ${{ github.repository_owner != 'arm' || github.ref_type == 'tag' }}
    runs-on: ${{ fromJson(vars.UBUNTU_RUNNER || '["ubuntu-24.04-arm"]') }}
    env:
      PUBLISH_PYPI_HOST: ${{ secrets.PUBLISH_PYPI_HOST || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv build
      - if: ${{ env.PUBLISH_PYPI_HOST != '' }}
        run: uv publish dist/*
        env:
          UV_PUBLISH_URL: ${{ env.PUBLISH_PYPI_HOST }}
          UV_PUBLISH_USERNAME: ${{ secrets.INTERNAL_PYPI_USERNAME || secrets.PUBLISH_PYPI_USERNAME }}
          UV_PUBLISH_PASSWORD: ${{ secrets.INTERNAL_PYPI_PASSWORD || secrets.PUBLISH_PYPI_PASSWORD }}

  sync_to_public_repo:
    needs: build_and_test_wheel
    if: ${{ github.event.repository.private }}
    uses: Arm-Debug/github-workflow-wizardry/.github/workflows/sync-to-public-repo.yml@main
    with:
      public_repo: arm/mlia
    secrets: inherit
